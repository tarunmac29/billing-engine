# ============================================================
# PayCycle Billing Engine — Application Configuration
# ============================================================
# Base config — sab profiles mein common settings
# Dev config  — application-dev.yml
# Prod config — application-prod.yml
# ============================================================

spring:
  application:
    name: paycycle-billing-engine

  # Active profile (override karo env variable se production mein)
  # SPRING_PROFILES_ACTIVE=prod java -jar billing-engine.jar
  profiles:
    active: dev

  # ----------------------------------------------------------
  # Jackson — JSON serialization settings
  # ----------------------------------------------------------
  jackson:
    default-property-inclusion: non_null     # null fields JSON mein nahi aayenge
    serialization:
      write-dates-as-timestamps: false        # "2024-01-15T10:30:00Z" format
    deserialization:
      fail-on-unknown-properties: false       # extra fields ignore karo

  # ----------------------------------------------------------
  # JPA / Hibernate
  # ----------------------------------------------------------
  jpa:
    open-in-view: false                       # IMPORTANT: ye false rakhna — lazy loading issues prevent karta hai
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 25                      # bulk inserts fast ho jaate hain
          order_inserts: true
          order_updates: true

  # ----------------------------------------------------------
  # Flyway — Database Migration
  # ----------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration        # V1__xxx.sql files yahan honi chahiye
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false                       # migrations sirf order mein chalein

  # ----------------------------------------------------------
  # Cache
  # ----------------------------------------------------------
  cache:
    type: redis

  # ----------------------------------------------------------
  # Async (@Async methods ke liye thread pool)
  # ----------------------------------------------------------
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 5000
      thread-name-prefix: "billing-async-"
    scheduling:
      pool:
        size: 5
      thread-name-prefix: "billing-scheduler-"

# ----------------------------------------------------------
# Server
# ----------------------------------------------------------
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ----------------------------------------------------------
# Actuator (Health checks, Metrics)
# ----------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ----------------------------------------------------------
# Custom PayCycle Settings
# ----------------------------------------------------------
paycycle:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000                  # 24 ghante
  idempotency:
    ttl-hours: 24                            # key 24 ghante tak valid rahegi
    lock-timeout-seconds: 30                 # duplicate request ke liye wait time
  billing:
    harvest-cron: "0 0 * * * *"             # har ghante chalega
    batch-size: 500                          # ek baar mein 500 subscriptions process
    max-retry-count: 3
  outbox:
    relay-cron: "*/5 * * * * *"             # har 5 second mein unpublished events bhejo

---
# ============================================================
# DEV Profile (application-dev.yml ka kaam ye section karta hai)
# spring.config.activate.on-profile: dev
# ============================================================
spring:
  config:
    activate:
      on-profile: dev

  # Dev mein MySQL — Docker container se connect
  datasource:
    url: jdbc:mysql://localhost:3306/paycycle_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: paycycle_user
    password: paycycle_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PayCycle-HikariPool-Dev
      minimum-idle: 2
      maximum-pool-size: 10               # dev mein kam connections kaafi hain
      connection-timeout: 30000           # 30 seconds wait karo connection ke liye
      idle-timeout: 600000                # 10 min idle ke baad close karo
      max-lifetime: 1800000               # 30 min max connection life

  # Dev mein Redis — Docker container se connect
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # Dev mein SQL queries print karo (production mein kabhi nahi)
  jpa:
    show-sql: true

# Dev mein DEBUG logs
logging:
  level:
    com.paycycle: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE    # query parameters bhi dikhenge

---
# ============================================================
# PROD Profile
# ============================================================
spring:
  config:
    activate:
      on-profile: prod

  # Production mein environment variables se credentials aate hain
  # kabhi hardcode mat karo!
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: PayCycle-HikariPool-Prod
      minimum-idle: 10
      maximum-pool-size: 50               # prod mein zyada connections
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000     # 60s se zyada koi connection hold kare toh alert

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true                     # prod mein SSL jaruri hai
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  jpa:
    show-sql: false                       # prod mein SQL print nahi hoga

# Prod mein sirf WARN aur upar
logging:
  level:
    com.paycycle: INFO
    org.springframework: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
